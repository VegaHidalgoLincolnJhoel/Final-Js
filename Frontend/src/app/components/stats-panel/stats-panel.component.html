<div class="row g-3 mb-4">
  <div class="col-6 col-lg-3">
    <div class="card h-100 shadow-sm border-0">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="bg-primary bg-opacity-10 text-primary rounded p-2 fs-4">👥</div>
        <div>
          <p class="text-uppercase text-muted small mb-0" style="font-size:.7rem;">Total Estudiantes</p>
          <p class="fs-4 fw-bold mb-0">{{ totalEstudiantes }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="col-6 col-lg-3">
    <div class="card h-100 shadow-sm border-0">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="bg-indigo bg-opacity-10 text-primary rounded p-2 fs-4">📘</div>
        <div>
          <p class="text-uppercase text-muted small mb-0" style="font-size:.7rem;">Promedio General</p>
          <p class="fs-4 fw-bold mb-0">{{ promedioGeneral }}</p>
          <p class="text-muted mb-0" style="font-size:.65rem;">De {{ conNotas }} con notas</p>
        </div>
      </div>
    </div>
  </div>

  <div class="col-6 col-lg-3">
    <div class="card h-100 shadow-sm border-0">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="bg-success bg-opacity-10 text-success rounded p-2 fs-4">🏅</div>
        <div>
          <p class="text-uppercase text-muted small mb-0" style="font-size:.7rem;">Aprobados</p>
          <p class="fs-4 fw-bold text-success mb-0">{{ aprobados }}</p>
          <p class="text-muted mb-0" style="font-size:.65rem;">Promedio ≥ 11</p>
        </div>
      </div>
    </div>
  </div>

  <div class="col-6 col-lg-3">
    <div class="card h-100 shadow-sm border-0">
      <div class="card-body d-flex align-items-center gap-3">
        <div class="bg-danger bg-opacity-10 text-danger rounded p-2 fs-4">⚠️</div>
        <div>
          <p class="text-uppercase text-muted small mb-0" style="font-size:.7rem;">Desaprobados</p>
          <p class="fs-4 fw-bold text-danger mb-0">{{ desaprobados }}</p>
          <p class="text-muted mb-0" style="font-size:.65rem;">
            {{ sinCalificar > 0 ? sinCalificar + ' sin calificar' : 'Todos evaluados' }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
